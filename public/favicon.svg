<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8734a"/>
      <stop offset="100%" style="stop-color:#c9956e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Bold radar waves -->
  <path d="M256,256 m-180,0 a180,180 0 1,1 360,0" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.25"/>
  <path d="M256,256 m-120,0 a120,120 0 1,1 240,0" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.4"/>
  <path d="M256,256 m-60,0 a60,60 0 1,1 120,0" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.55"/>
  <!-- Center: white plate with big fork -->
  <circle cx="256" cy="280" r="75" fill="white" opacity="0.95"/>
  <g transform="translate(256, 280)" fill="none" stroke="#b8734a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fork: 3 prongs + handle, centered and large -->
    <line x1="-16" y1="-38" x2="-16" y2="-10"/>
    <line x1="0" y1="-38" x2="0" y2="-10"/>
    <line x1="16" y1="-38" x2="16" y2="-10"/>
    <path d="M-16,-10 Q-16,6 0,6 Q16,6 16,-10"/>
    <line x1="0" y1="6" x2="0" y2="40"/>
  </g>
</svg>
