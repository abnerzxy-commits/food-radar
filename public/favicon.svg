<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8734a"/>
      <stop offset="100%" style="stop-color:#c9956e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Bold radar waves -->
  <path d="M256,250 m-185,0 a185,185 0 1,1 370,0" fill="none" stroke="white" stroke-width="30" stroke-linecap="round" opacity="0.25"/>
  <path d="M256,250 m-125,0 a125,125 0 1,1 250,0" fill="none" stroke="white" stroke-width="30" stroke-linecap="round" opacity="0.4"/>
  <path d="M256,250 m-65,0 a65,65 0 1,1 130,0" fill="none" stroke="white" stroke-width="30" stroke-linecap="round" opacity="0.55"/>
  <!-- Center: white plate -->
  <circle cx="256" cy="285" r="90" fill="white" opacity="0.95"/>
  <!-- Big cute fork -->
  <g transform="translate(256, 285)" fill="none" stroke="#b8734a" stroke-linecap="round" stroke-linejoin="round">
    <!-- 3 rounded prongs -->
    <line x1="-22" y1="-48" x2="-22" y2="-12" stroke-width="11"/>
    <line x1="0" y1="-52" x2="0" y2="-12" stroke-width="11"/>
    <line x1="22" y1="-48" x2="22" y2="-12" stroke-width="11"/>
    <!-- Curved bridge connecting prongs -->
    <path d="M-22,-12 Q-22,10 0,10 Q22,10 22,-12" stroke-width="10" fill="none"/>
    <!-- Handle -->
    <line x1="0" y1="10" x2="0" y2="52" stroke-width="12"/>
    <!-- Cute round end -->
    <circle cx="0" cy="55" r="7" fill="#b8734a" stroke="none"/>
  </g>
</svg>
